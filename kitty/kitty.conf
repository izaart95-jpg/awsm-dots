# ~/.config/kitty/kitty.conf

# Font
font_family      JetBrainsMono Nerd Font
font_size        12
bold_font        auto
italic_font      auto
bold_italic_font auto

# Enable font ligatures
font_features    JetBrainsMono Nerd Font +ss03 +ss04 +ss05 +ss06
disable_ligatures never

# Transparency
background_opacity 0.85
dynamic_background_opacity yes

# Colors (Catppuccin Mocha)
background #1e1e2e
foreground #cdd6f4
selection_background #585b70
selection_foreground #cdd6f4

# Black
color0 #45475a
color8 #585b70

# Red
color1 #f38ba8
color9 #f38ba8

# Green
color2 #a6e3a1
color10 #a6e3a1

# Yellow
color3 #f9e2af
color11 #f9e2af

# Blue
color4 #89b4fa
color12 #89b4fa

# Magenta
color5 #cba6f7
color13 #cba6f7

# Cyan
color6 #94e2d5
color14 #94e2d5

# White
color7 #bac2de
color15 #bac2de

# Cursor
cursor #f5e0dc
cursor_text_color #1e1e2e

# Window
window_padding_width 8
window_margin_width 0
hide_window_decorations titlebar-only
remember_window_size no
initial_window_width 800
initial_window_height 600

# Performance
sync_to_monitor yes
repaint_delay 10
input_delay 3

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +G

# Mouse
mouse_hide_wait 2
url_color #89b4fa
url_style curly

# Shell integration
shell_integration enabled

# MacOS specific (ignore if not on macOS)
macos_option_as_alt yes
macos_thicken_font 0
