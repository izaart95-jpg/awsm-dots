# ~/.config/picom/picom.conf

#################################
# Backend
#################################

backend = "xrender";
vsync = false;
use-damage = false;

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 8;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-opacity = 0.4;
shadow-red = 0;
shadow-green = 0;
shadow-blue = 0;

shadow-exclude = [
    "class_g = 'Rofi'",
    "name ~= 'Rofi'",
    "class_g = 'dunst'",
    "name = 'Notification'",
    "window_type *= 'dock'",
    "window_type *= 'desktop'",
    "window_type *= 'tooltip'",
    "class_g = 'Alacritty'",
    "class_g = 'Kitty'",
    "class_g = 'st'"
];

#################################
# Fading
#################################

fading = true;
fade-delta = 5;
fade-in-step = 0.02;
fade-out-step = 0.02;
fade-exclude = [
    "class_g = 'Rofi'",
    "class_g = 'dunst'"
];

#################################
# Transparency / Opacity
#################################

inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;
detect-client-opacity = true;

opacity-rule = [
    "90:class_g = 'Rofi'",
    "90:class_g = 'dunst'"
];

#################################
# Rounded Corners
#################################

corner-radius = 12;
rounded-corners-exclude = [
    "class_g = 'dunst'",
    "class_g = 'Rofi'",
    "window_type *= 'dock'",
    "window_type *= 'desktop'"
];

#################################
# Blur - DISABLED for stability
#################################

blur-method = "none";
blur-strength = 0;
blur-background = false;

#################################
# Performance Settings
#################################

transparent-clipping = true;
unredir-if-possible = true;
detect-client-opacity = true;
transparent-clipping-exclude = [
    "class_g = 'Rofi'",
    "class_g = 'dunst'"
];

#################################
# Window Type Settings
#################################

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.98; }
  dropdown_menu = { opacity = 0.98; }
  utility = { };
  desktop = { };
};

#################################
# Focus Settings
#################################

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-transient = true;
detect-client-leader = true;
